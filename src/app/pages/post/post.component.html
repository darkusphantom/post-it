<ng-container>
  <div class="min-h-screen bg-gray-900">
    <!-- Header -->
    <header
      class="bg-gray-700 text-white p-4 shadow-md flex items-center gap-2"
    >
      <a
        [routerLink]="['/dashboard']"
        class="px-4 py-2 text-sm font-medium text-white bg-gray-500 border border-transparent rounded-md shadow-sm hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500"
      >
        <svg
          class="w-6 h-6 text-gray-800 dark:text-white"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 8 14"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M7 1 1.3 6.326a.91.91 0 0 0 0 1.348L7 13"
          />
        </svg>
      </a>
      <h1 class="text-2xl font-bold">Post It!</h1>
    </header>
    <!-- Main content -->
    <div class="p-6" *ngIf="post; else skeleton">
      <div
        class="max-w-4xl mx-auto bg-white rounded-lg shadow-md dark:bg-gray-800 overflow-hidden"
      >
        <!-- Fecha y título -->
        <div class="p-6 border-b border-gray-200 dark:border-gray-700">
          <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">
            {{ post.date | date : "longDate" }}
          </p>
          <h1 class="text-3xl font-bold text-gray-900 dark:text-white">
            {{ post.title.rendered }}
          </h1>
        </div>

        <!-- Contenido del post -->
        <div class="p-6">
          <!-- Skeleton mientras carga el contenido -->
          <div *ngIf="isLoadingContent" class="space-y-4 animate-pulse">
            <div
              class="h-4 bg-gray-200 rounded-full dark:bg-gray-700 w-3/4"
            ></div>
            <div class="h-4 bg-gray-200 rounded-full dark:bg-gray-700"></div>
            <div
              class="h-4 bg-gray-200 rounded-full dark:bg-gray-700 w-5/6"
            ></div>
            <div
              class="h-4 bg-gray-200 rounded-full dark:bg-gray-700 w-2/3"
            ></div>
            <div
              class="h-4 bg-gray-200 rounded-full dark:bg-gray-700 w-4/5"
            ></div>
            <span class="sr-only">Loading...</span>
          </div>

          <!-- Contenido real -->
          <div
            [innerHTML]="post.content.rendered"
            class="prose prose-lg max-w-none text-white prose-headings:text-white prose-p:text-white prose-a:text-blue-400 hover:prose-a:text-blue-300 prose-strong:text-white prose-code:text-white prose-pre:bg-gray-900 prose-blockquote:text-white prose-ul:text-white prose-ol:text-white prose-li:text-white "
          ></div>
        </div>
      </div>
      <button
        data-modal-target="prepublish-modal"
        data-modal-toggle="prepublish-modal"
        (click)="prepareToPublish()"
        class="mt-4 px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-md shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
      >
        Publicar
      </button>

      <!-- Modal Prepublish -->
      <div
        id="prepublish-modal"
        tabindex="-1"
        aria-hidden="true"
        class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full"
      >
        <div class="relative p-4 w-full max-w-2xl max-h-full">
          <!-- Modal content -->
          <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
            <!-- Modal header -->
            <div
              class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-gray-200"
            >
              <h3 class="text-xl font-semibold text-gray-900 dark:text-white">
                Preparando para publicar
              </h3>
              <button
                type="button"
                class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white"
                data-modal-hide="prepublish-modal"
              >
                <svg
                  class="w-3 h-3"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 14 14"
                >
                  <path
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
                  />
                </svg>
                <span class="sr-only">Close modal</span>
              </button>
            </div>
            <!-- Modal body -->
            <div class="p-4 md:p-5 space-y-4">
              <textarea
                [formControl]="aiResponse"
                class="w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                rows="6"
              ></textarea>
            </div>
            <!-- Modal footer -->
            <div
              class="flex items-center p-4 md:p-5 border-t border-gray-200 rounded-b dark:border-gray-600"
            >
              <button
                data-modal-hide="prepublish-modal"
                data-modal-target="popup-modal"
                data-modal-toggle="popup-modal"
                (click)="sendPost()"
                type="button"
                class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
              >
                Send it!
              </button>
              <button
                data-modal-hide="prepublish-modal"
                type="button"
                class="py-2.5 px-5 ms-3 text-sm font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100 dark:focus:ring-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:text-white dark:hover:bg-gray-700"
              >
                Cancel
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Modal Finished -->
      <div
        id="popup-modal"
        tabindex="-1"
        class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full"
      >
        <div class="relative p-4 w-full max-w-md max-h-full">
          <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
            <button
              type="button"
              class="absolute top-3 end-2.5 text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white"
              data-modal-hide="popup-modal"
            >
              <svg
                class="w-3 h-3"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 14 14"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
                />
              </svg>
              <span class="sr-only">Close modal</span>
            </button>
            <div class="p-4 md:p-5 text-center">
              <h3
                class="mb-5 text-lg font-normal text-gray-500 dark:text-gray-400"
              >
                ✔️ Niceeee. You post right now is published! Do you want go out?
              </h3>
              <button
                data-modal-hide="popup-modal"
                type="button"
                class="text-white bg-blue-600 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 dark:focus:ring-blue-800 font-medium rounded-lg text-sm inline-flex items-center px-5 py-2.5 text-center"
              >
                Yes, I'm sure
              </button>
              <button
                data-modal-target="prepublish-modal"
                data-modal-toggle="prepublish-modal"
                data-modal-hide="popup-modal"
                type="button"
                class="py-2.5 px-5 ms-3 text-sm font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100 dark:focus:ring-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:text-white dark:hover:bg-gray-700"
              >
                No, cancel
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #notFound>
  <div class="p-4 bg-white rounded-lg shadow-md dark:bg-gray-800">
    <h2 class="text-xl font-bold text-gray-900 dark:text-white">
      Post Not Found
    </h2>
    <div class="mt-4 text-gray-600 dark:text-gray-400">
      The post you are looking for does not exist.
    </div>
  </div>
</ng-template>

<ng-template #skeleton>
  <div role="status" class="space-y-2.5 animate-pulse max-w-lg">
    <div class="flex items-center w-full">
      <div class="h-2.5 bg-gray-200 rounded-full dark:bg-gray-700 w-32"></div>
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-24"
      ></div>
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-full"
      ></div>
    </div>
    <div class="flex items-center w-full max-w-[480px]">
      <div class="h-2.5 bg-gray-200 rounded-full dark:bg-gray-700 w-full"></div>
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-full"
      ></div>
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-24"
      ></div>
    </div>
    <div class="flex items-center w-full max-w-[400px]">
      <div class="h-2.5 bg-gray-300 rounded-full dark:bg-gray-600 w-full"></div>
      <div
        class="h-2.5 ms-2 bg-gray-200 rounded-full dark:bg-gray-700 w-80"
      ></div>
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-full"
      ></div>
    </div>
    <div class="flex items-center w-full max-w-[480px]">
      <div
        class="h-2.5 ms-2 bg-gray-200 rounded-full dark:bg-gray-700 w-full"
      ></div>
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-full"
      ></div>
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-24"
      ></div>
    </div>
    <div class="flex items-center w-full max-w-[440px]">
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-32"
      ></div>
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-24"
      ></div>
      <div
        class="h-2.5 ms-2 bg-gray-200 rounded-full dark:bg-gray-700 w-full"
      ></div>
    </div>
    <div class="flex items-center w-full max-w-[360px]">
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-full"
      ></div>
      <div
        class="h-2.5 ms-2 bg-gray-200 rounded-full dark:bg-gray-700 w-80"
      ></div>
      <div
        class="h-2.5 ms-2 bg-gray-300 rounded-full dark:bg-gray-600 w-full"
      ></div>
    </div>
    <span class="sr-only">Loading...</span>
  </div>
</ng-template>
